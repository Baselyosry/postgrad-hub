<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/logo2.png" type="image/png" />
    <title>MUST Post Graduate</title>
    <meta name="description" content="Postgraduate Management Portal for Master's and PhD students at MUST University" />
    <meta name="author" content="MUST University" />

    <meta property="og:title" content="MUST Post Graduate" />
    <meta property="og:description" content="Postgraduate Management Portal for Master's and PhD students at MUST University" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo2.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/logo2.png" />
  </head>

  <body>
    <script>
      (function () {
        try {
          if ("scrollRestoration" in history) history.scrollRestoration = "manual";
          var nav = performance.getEntriesByType && performance.getEntriesByType("navigation")[0];
          if (nav && nav.type === "reload") {
            window.scrollTo(0, 0);
            if (location.hash) {
              history.replaceState(null, "", location.pathname + location.search);
            }
          }
        } catch (e) {}
        try {
          var k = "postgrad-hub-ui-theme";
          var t = localStorage.getItem(k);
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (t !== "light" && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
