# Applies pending SQL migrations to the linked Supabase project (`supabase db push`).
#
# Required repository secrets:
#   SUPABASE_ACCESS_TOKEN — Personal access token from https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD  — Database password (Settings → Database)
#
# Optional:
#   SUPABASE_PROJECT_REF — Overrides `project_id` in supabase/config.toml when set

name: Supabase database push

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: supabase-db-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Missing repository secret SUPABASE_ACCESS_TOKEN. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "::error::Missing repository secret SUPABASE_DB_PASSWORD (Database password in the Supabase dashboard)."
            exit 1
          fi
          PROJECT_REF="${SUPABASE_PROJECT_REF}"
          if [ -z "${PROJECT_REF}" ] && [ -f supabase/config.toml ]; then
            PROJECT_REF="$(awk -F'"' '/^project_id[[:space:]]*=/ { print $2; exit }' supabase/config.toml || true)"
          fi
          if [ -z "${PROJECT_REF}" ]; then
            echo "::error::Could not resolve Supabase project ref. Set secret SUPABASE_PROJECT_REF or project_id in supabase/config.toml."
            exit 1
          fi
          supabase link --project-ref "${PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push
