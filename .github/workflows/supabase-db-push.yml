# Applies pending SQL migrations to the linked Supabase project (`supabase db push`).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD  — Project Settings → Database → Database password
#
# Optional:
#   SUPABASE_PROJECT_REF — Overrides `project_id` in supabase/config.toml when set
#
# If those secrets are absent, the push steps are skipped and a workflow warning is
# emitted so CI stays green until the repo owner configures Supabase.

name: Supabase database push

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: supabase-db-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when Supabase secrets are not configured
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN == '' || secrets.SUPABASE_DB_PASSWORD == '' }}
        run: |
          echo "::warning::Supabase db push was skipped. Add repository secrets SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD under Settings → Secrets and variables → Actions, then re-run this workflow or push again. Token: https://supabase.com/dashboard/account/tokens"

      - name: Setup Supabase CLI
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_DB_PASSWORD != '' }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_DB_PASSWORD != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          PROJECT_REF="${SUPABASE_PROJECT_REF}"
          if [ -z "${PROJECT_REF}" ] && [ -f supabase/config.toml ]; then
            PROJECT_REF="$(awk -F'"' '/^project_id[[:space:]]*=/ { print $2; exit }' supabase/config.toml || true)"
          fi
          if [ -z "${PROJECT_REF}" ]; then
            echo "::error::Could not resolve Supabase project ref. Set secret SUPABASE_PROJECT_REF or project_id in supabase/config.toml."
            exit 1
          fi
          supabase link --project-ref "${PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}"

      - name: Push migrations
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_DB_PASSWORD != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push
